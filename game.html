<h3>Controls</h3>

</section>



<script>

const games = {

    moto: {
        name: "Moto X3M",
        link: "https://www.miniplay.com/embed/moto-x3m",
        description: "Race through crazy tracks, avoid traps, and finish as fast as possible!"
    },

    run3: {

    },

    drift: {
        name: "Drift Hunters",
        link: "https://drifthuntersonline.gitlab.io/file/",
        description: "Customize cars and master your drifting skills!"
    },

    subway: {
        name: "Subway Surfers",
        link: "https://files.gamezhero.com/game/905/1d1/9051d1173be765fb/data/index.html",
        description: "Dodge obstacles and collect coins!"
    },

    minecraft: {
    name: "Minecraft Classic",

    description: "Build and explore in a classic Minecraft world!"
    
   },

    geometry: {

    stickmanhook: {

},

};



const url = new URLSearchParams(window.location.search);

const chosenGame = url.get("game");



if (games[chosenGame]) {

    document.getElementById("title").textContent = games[chosenGame].name;

    document.getElementById("player").src = games[chosenGame].link;

    document.getElementById("description").textContent = games[chosenGame].description;

} else {

    document.getElementById("title").textContent = "Currently unavailable";

}



document.getElementById("fullscreen").onclick = function() {

    document.getElementById("player").requestFullscreen();

};


</script>
